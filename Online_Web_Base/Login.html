<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login Page</title>

<style>
  body {
    background: url("Spist.jpg") no-repeat center center fixed;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
  }
  .login-container {
    background: rgba(255, 255, 255, 0.8);
    border-radius: 15px;
    padding: 30px 40px;
    width: 320px;
    box-sizing: border-box;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    position: relative;
  }
  .login-header {
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 20px;
    position: relative;
  }
  .login-header .help-icon {
    position: absolute;
    right: 0;
    font-weight: normal;
    font-size: 18px;
    cursor: pointer;
  }
  .input-group {
    margin-bottom: 15px;
    position: relative;
  }
  label {
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 5px;
    display: block;
  }
  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 10px 40px 10px 10px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 3px;
    box-sizing: border-box;
  }
  .input-group.password-group input {
    padding-right: 35px;
  }
  .eye-icon {
    position: absolute;
    right: 10px;
    top: 30px;
    font-size: 18px;
    cursor: pointer;
    user-select: none;
    color: #444;
  }
  .sign-in-btn {
    width: 100%;
    background-color: #00b35d;
    border: none;
    padding: 12px 0;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 500;
    color: black;
    cursor: pointer;
    margin-top: 10px;
    margin-bottom: 10px;
  }
  .sign-in-btn:hover {
    background-color: #048a40;
  }
  .forgot-password {
    font-weight: 600;
    font-size: 12px;
    color: black;
    cursor: pointer;
    margin-bottom: 10px;
    text-align: center;
  }
  .create-account {
    font-weight: 600;
    font-size: 12px;
    color: black;
    text-align: center;
  }
  .create-account a {
    font-weight: 600;
    color: #000000;
    text-decoration: underline;
    cursor: pointer;
  }
  </style>

</head>
<body>

<div class="login-container">
  <div class="login-header">
    LOG IN
    <span class="help-icon">?</span>
  </div>

  <div class="input-group">
    <input type="text" id="username" placeholder="" />
    <label for="username">Username</label>
  </div>

  <div class="input-group password-group">
    <input type="password" id="password" placeholder="" />
    <span class="eye-icon" id="togglePassword">&#128065;</span>
    <label for="password">Password</label>
  </div>

  <button class="sign-in-btn">SIGN IN</button>

  <div class="forgot-password">Forgot Password</div>

  <div class="create-account">
    Don`t have an account? <a href="#">Create</a>
  </div>
</div>

<script>
  // Toggle password visibility
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');

  togglePassword.addEventListener('click', () => {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
  });
</script>

</body>
</html>
